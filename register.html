<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-image: url(img/fundo.png);
             background-size: cover;
             background-position: center;
             background-attachment: fixed;
             overflow: hidden;">
    <button class="rgt_log">Voltar</button>
    <main>
    <div class="register">
        <h2>REGISTRO</h2>
        <form class="form_cadastro" action="" method="">
            <input type="email" placeholder="Email:" required>
            <input type="text" placeholder="Nome:" required>
            <input type="password" placeholder="Senha:" required min="6" max="12">
            <input type="password" placeholder="Confirmar senha:" required min="6" max="12">
            <br><br>
            <input type="submit">
        </form>
    </div>
    </main>
</body>
</html>
